name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e .

      - name: Build runtime
        run: make build

      - name: Run unit tests
        run: make test

      - name: Run full test discovery
        run: PYTHONPATH=src python -m unittest discover
